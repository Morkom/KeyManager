version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: keymanager-db
    ports:
      - "54320:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=keymanager
      - POSTGRES_USER=keymanager
      - POSTGRES_PASSWORD=password

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./keystores:/app/keystores
      - ./crl_db:/app/crl_db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/keymanager
      - SPRING_DATASOURCE_USERNAME=keymanager
      - SPRING_DATASOURCE_PASSWORD=password
      - KEYMANAGER_KEYSTORE_PATH=/app/keystores
      - KEYMANAGER_CRLDB_PATH=/app/crl_db
    depends_on:
      - db

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8080
    command: >
      sh -c "rm -rf node_modules/.vite && npm install && npm run dev"

volumes:
  postgres-data:
