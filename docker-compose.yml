version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./keystores:/app/keystores
      - ./crl_db:/app/crl_db
    environment:
      - KEYMANAGER_KEYSTORE_PATH=/app/keystores
      - KEYMANAGER_CRLDB_PATH=/app/crl_db

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      # The browser, running on the host, needs to connect to localhost.
      - VITE_API_BASE_URL=http://localhost:8080
    command: >
      sh -c "npm install && npm run dev"
