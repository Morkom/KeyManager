# Server configuration
server.port=8080

# Keystore configuration (can be overridden by environment variables)
keymanager.keystore.path=./keystores
keymanager.privatekey.path=./private_keys
keymanager.crldb.path=./crl_db

# --- Database Configuration (PostgreSQL for Production/Development) ---
# The actual URL, username, and password should be provided via environment variables.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate settings
# 'validate' is safer for production than 'update'. It checks if the schema matches the entities.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
